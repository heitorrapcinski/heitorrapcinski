  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

&quot;defaultLang&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;en&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;options&quot;:[&quot;en&quot;,&quot;pt&quot;]}}\">\nclass Component extends DCLogic {\n  state = { lang: 'en', dark: false };\n\n  componentDidMount() {\n    if ((this.props.defaultTheme ?? 'light') === 'dark') this.setState({ dark: true });\n    if (this.props.defaultLang && this.props.defaultLang !== 'en') this.setState({ lang: this.props.defaultLang });\n    if (this.props.accent) document.documentElement.style.setProperty('--accent', this.props.accent);\n    document.documentElement.dataset.theme = this.state.dark ? 'dark' : 'light';\n    if (!window.matchMedia('(prefers-reduced-motion: reduce)').matches && 'IntersectionObserver' in window) {\n      const io = new IntersectionObserver((entries) => {\n        entries.forEach(e => { if (e.isIntersecting) { e.target.dataset.reveal = 'in'; io.unobserve(e.target); } });\n      }, { threshold: 0.08 });\n      document.querySelectorAll('[data-reveal]').forEach(el => io.observe(el));\n    } else {\n      document.querySelectorAll('[data-reveal]').forEach(el => el.dataset.reveal = 'in');\n    }\n  }\n\n  componentDidUpdate() {\n    document.documentElement.dataset.theme = this.state.dark ? 'dark' : 'light';\n  }\n\n  i18n() {\n    const en = {\n      themeLabel: this.state.dark ? 'Light' : 'Dark',\n      themeAria: this.state.dark ? 'Switch to light mode' : 'Switch to dark mode',\n      emailLabel: 'Email',\n      heroKicker: 'Technology Leader — 30+ yrs in IT',\n      headline: 'Technology Leader | 30+ yrs in IT, 11+ leading teams (Manager to Superintendent) | Solution Architecture, Multicloud & IBM Z | Developing leaders and high-performance teams',\n      aboutKicker: 'About',\n      bio: 'Technology leader with 30+ years in IT — over a decade leading teams from management to superintendent level in mission-critical government environments. In 2023 I deliberately returned to hands-on engineering: multicloud (AWS, Google Cloud, IBM), IBM Z, SRE, Kubernetes and applied AI. Today I build methods and tools that connect software engineering, knowledge management and AI — I write about this journey — and developing people and leaders is the part of the work I enjoy most.',\n      writingTitle: 'Writing',\n      writingNote: 'Essays from the comeback — written in Portuguese on LinkedIn.',\n      methodKicker: 'Method & Knowledge',\n      methodSub: 'A progression: personal practice → methodology → platform.',\n      steps: ['Practice', 'Methodology', 'Platform'],\n      engKicker: 'Engineering & Architecture',\n      zenText: 'ZenEngineeringLab is my personal engineering lab — where ideas become product: predictable operations (ZenAndOps), connected communities (ZenAndVillage), traceable knowledge (KnowledgeGraphGuru).',\n      certTitle: 'Certifications, 2023 → 2026',\n      certFootnote: '60+ badges in total — full record on',\n      footerText: 'If you work with software architecture, AWS serverless, knowledge management — or are living your own hands-on comeback with AI — let\\u2019s talk.',\n      repoLabel: 'repo',\n      essayLabel: 'essay',\n      essay3Label: 'essay: part 3',\n      essay12aLabel: 'essay: part 1',\n      essay12bLabel: 'essay: part 2',\n      codeLabel: 'code as narrated',\n      articles: [\n        { badge: 'Comeback series · Part 1', title: 'From manager to dev: how I used AI to modernize an open-source project in a weekend', summary: 'After a decade leading, coding again with AI as a partner.' },\n        { badge: 'Comeback series · Part 2', title: 'From learning to architecture: how 8 specs and a few steering documents produced a solution foundation from scratch', summary: 'ITSM, SRE and AI as guides.' },\n        { badge: 'Comeback series · Part 3', title: 'How swapping Kiro for Claude Code changed the speed and quality of the code', summary: 'A single file governing the agents, in a serverless hexagonal architecture.' },\n        { badge: 'Essay', title: 'I turned public government procurement data into competitive intelligence with Claude', summary: 'Open data + MCP in practice.' },\n        { badge: 'Essay', title: 'The Engine Is a Commodity. Now What?', summary: 'Agentic organizations — and where the edge will be when everyone has the same engine.' }\n      ],\n      methods: [\n        { name: 'Engineering Knowledge Vault', desc: 'My second brain in Obsidian: Atomic Notes, Zettelkasten and AI-assisted curation. Books are temporary; concepts are permanent.' },\n        { name: 'CAD — Collaborative Augmented Discovery', desc: 'A methodology + Claude plugin where experts and AI agents build traceable, auditable knowledge about complex systems — synthesized into Lean Inception, DDD and Event Storming artifacts. No evidence, no claim.' },\n        { name: 'KnowledgeGraphGuru', desc: 'A knowledge platform for humans and AI agents, built on a canonical knowledge graph. Knowledge is the source of truth; Markdown is just a rendering. Serverless on AWS, design-first.' }\n      ],\n      projects: [\n        { name: 'ZenAndVillage', desc: 'AI-powered multi-tenant SaaS for condominium management (AWS CDK, Cognito, DynamoDB, WebSockets, React PWA), with cost modeled per scale tier.' },\n        { name: 'ZenAndOps', desc: 'Platform unifying ITSM and SRE practices — where the comeback journey began.' },\n        { name: 'GovBR Claude Plugin', desc: 'Natural-language access to Brazil\\u2019s public procurement APIs (PNCP and Compras.gov.br) via MCP: 54 tools, structured observability, MCPB packaging.' }\n      ],\n      timeline: [\n        { year: '2023', items: [\n          { t: 'AWS Certified Cloud Practitioner (Sep)', hl: true },\n          { t: 'IBM Z immersion: z/OS Mainframe Practitioner (Dec)', hl: false }\n        ]},\n        { year: '2024', items: [\n          { t: 'Full mainframe track — ~15 badges: COBOL, REXX, CICS, Db2, Zowe, Assembler, IBM Z Xplore All Star', hl: false },\n          { t: 'IBM Cloud Advocate', hl: false }\n        ]},\n        { year: '2025', items: [\n          { t: 'IBM Certified Technical Advocate \\u2013 Cloud v5 (Mar)', hl: true },\n          { t: 'IBM Z GSA Mainframe System Administrator L1 (Mar)', hl: true },\n          { t: 'AWS Certified AI Practitioner (May)', hl: true },\n          { t: 'AWS Certified Solutions Architect \\u2013 Associate (Sep)', hl: true },\n          { t: 'Google Cloud Computing Foundations (Nov)', hl: true },\n          { t: 'Linux Foundation tracks: Kubernetes, GitOps, SRE, OpenTofu, OpenTelemetry', hl: false }\n        ]},\n        { year: '2026', items: [\n          { t: '\\u201CComeback journey\\u201D essay series + projects built in public', hl: false }\n        ]}\n      ]\n    };\n    const pt = {\n      ...en,\n      themeLabel: this.state.dark ? 'Claro' : 'Escuro',\n      themeAria: this.state.dark ? 'Mudar para modo claro' : 'Mudar para modo escuro',\n      emailLabel: 'E-mail',\n      heroKicker: 'Líder de Tecnologia — 30+ anos em TI',\n      headline: 'Líder de Tecnologia | 30+ anos em TI, 11+ em liderança (Gerência a Superintendência) | Desenvolvimento de líderes e times de alto desempenho | Arquitetura, Multicloud & IBM Z',\n      aboutKicker: 'Sobre',\n      bio: 'Líder de tecnologia com 30+ anos de estrada, sendo mais de uma década em posições de gerência a superintendência em ambientes de missão crítica. Em 2023, escolhi voltar às raízes técnicas: multicloud (AWS, Google Cloud, IBM), IBM Z, SRE, Kubernetes e IA aplicada. Hoje construo métodos e ferramentas que unem engenharia de software, gestão do conhecimento e IA — escrevo sobre essa jornada — e me realizo desenvolvendo pessoas e líderes.',\n      writingTitle: 'Escrita',\n      writingNote: 'Ensaios da retomada — publicados no LinkedIn.',\n      methodKicker: 'Método & Conhecimento',\n      methodSub: 'Uma progressão: prática pessoal → metodologia → plataforma.',\n      steps: ['Prática', 'Metodologia', 'Plataforma'],\n      engKicker: 'Engenharia & Arquitetura',\n      zenText: 'O ZenEngineeringLab é meu laboratório pessoal de engenharia — onde as ideias viram produto: operações previsíveis (ZenAndOps), comunidades conectadas (ZenAndVillage), conhecimento rastreável (KnowledgeGraphGuru).',\n      certTitle: 'Certificações, 2023 → 2026',\n      certFootnote: '60+ badges no total — registro completo no',\n      footerText: 'Se você trabalha com arquitetura de software, AWS serverless, gestão do conhecimento — ou está vivendo sua própria retomada hands-on com IA — vamos trocar ideias.',\n      repoLabel: 'repo',\n      essayLabel: 'artigo',\n      essay3Label: 'artigo: parte 3',\n      essay12aLabel: 'artigo: parte 1',\n      essay12bLabel: 'artigo: parte 2',\n      codeLabel: 'código da versão narrada',\n      articles: [\n        { badge: 'Série da retomada · Parte 1', title: 'De gestor a dev: como usei IA para modernizar um projeto open source em um fim de semana', summary: 'Depois de uma década liderando, voltar a programar com IA como parceira.' },\n        { badge: 'Série da retomada · Parte 2', title: 'Do aprendizado à arquitetura: como 8 specs e alguns \\u201Csteering documents\\u201D geraram uma fundação de solução do zero', summary: 'ITSM, SRE e IA como guias.' },\n        { badge: 'Série da retomada · Parte 3', title: 'Como trocar o Kiro pelo Claude Code mudou a velocidade e a qualidade do código', summary: 'Um único arquivo governando os agentes, numa arquitetura hexagonal serverless.' },\n        { badge: 'Ensaio', title: 'Transformei dados públicos de compras do governo em inteligência competitiva com Claude', summary: 'Dados abertos + MCP na prática.' },\n        { badge: 'Ensaio', title: 'O Motor é Commodity. E Agora?', summary: 'Organizações agênticas — e onde estará o diferencial quando todos tiverem o mesmo motor.' }\n      ],\n      methods: [\n        { name: 'Engineering Knowledge Vault', desc: 'Meu segundo cérebro no Obsidian: notas atômicas, Zettelkasten e curadoria assistida por IA. Livros são temporários; conceitos são permanentes.' },\n        { name: 'CAD — Collaborative Augmented Discovery', desc: 'Metodologia + plugin Claude em que especialistas e agentes de IA constroem conhecimento rastreável e auditável sobre sistemas complexos — sintetizado em artefatos de Lean Inception, DDD e Event Storming. Sem evidência, não há afirmação.' },\n        { name: 'KnowledgeGraphGuru', desc: 'Plataforma de conhecimento para humanos e agentes de IA, construída sobre um grafo de conhecimento canônico. O conhecimento é a fonte da verdade; Markdown é só uma renderização. Serverless na AWS, design-first.' }\n      ],\n      projects: [\n        { name: 'ZenAndVillage', desc: 'SaaS multi-tenant com IA para gestão de condomínios (AWS CDK, Cognito, DynamoDB, WebSockets, React PWA), com custo modelado por faixa de escala.' },\n        { name: 'ZenAndOps', desc: 'Plataforma que unifica práticas de ITSM e SRE — onde a jornada de retomada começou.' },\n        { name: 'GovBR Claude Plugin', desc: 'Acesso em linguagem natural às APIs de compras públicas do Brasil (PNCP e Compras.gov.br) via MCP: 54 ferramentas, observabilidade estruturada, empacotamento MCPB.' }\n      ],\n      timeline: [\n        { year: '2023', items: [\n          { t: 'AWS Certified Cloud Practitioner (set)', hl: true },\n          { t: 'Imersão IBM Z: z/OS Mainframe Practitioner (dez)', hl: false }\n        ]},\n        { year: '2024', items: [\n          { t: 'Trilha mainframe completa — ~15 badges: COBOL, REXX, CICS, Db2, Zowe, Assembler, IBM Z Xplore All Star', hl: false },\n          { t: 'IBM Cloud Advocate', hl: false }\n        ]},\n        { year: '2025', items: [\n          { t: 'IBM Certified Technical Advocate \\u2013 Cloud v5 (mar)', hl: true },\n          { t: 'IBM Z GSA Mainframe System Administrator L1 (mar)', hl: true },\n          { t: 'AWS Certified AI Practitioner (mai)', hl: true },\n          { t: 'AWS Certified Solutions Architect \\u2013 Associate (set)', hl: true },\n          { t: 'Google Cloud Computing Foundations (nov)', hl: true },\n          { t: 'Trilhas Linux Foundation: Kubernetes, GitOps, SRE, OpenTofu, OpenTelemetry', hl: false }\n        ]},\n        { year: '2026', items: [\n          { t: 'Série de artigos \\u201Cjornada de retomada\\u201D + projetos em público', hl: false }\n        ]}\n      ]\n    };\n    return this.state.lang === 'pt' ? pt : en;\n  }\n\n  renderVals() {\n    const t = this.i18n();\n    const isEn = this.state.lang === 'en';\n    const artUrls = [\n      'https://www.linkedin.com/pulse/de-gestor-dev-como-usei-ia-para-modernizar-um-projeto-rapcinski-uaujf',\n      'https://www.linkedin.com/pulse/do-aprendizado-%C3%A0-arquitetura-como-8-specs-e-alguns-uma-rapcinski-rpywf',\n      'https://www.linkedin.com/pulse/como-trocar-o-kiro-pelo-claude-code-mudou-velocidade-e-rapcinski-p4aef',\n      'https://www.linkedin.com/pulse/transformei-dados-p%C3%BAblicos-de-compras-do-governo-em-com-rapcinski-sg6yf',\n      'https://www.linkedin.com/pulse/o-motor-%C3%A9-commodity-e-agora-heitor-rapcinski-zjgxf'\n    ];\n    const articles = t.articles.map((a, i) => ({\n      ...a, url: artUrls[i],\n      badgeColor: i < 3 ? 'var(--gold)' : 'var(--muted)'\n    }));\n    const methodUrls = [\n      'https://github.com/heitorrapcinski/Knowledge-Vault',\n      'https://github.com/heitorrapcinski/CAD-Claude-Plugin',\n      'https://github.com/ZenEngineeringLab/KnowledgeGraphGuru'\n    ];\n    const methods = t.methods.map((m, i) => ({ ...m, url: methodUrls[i], num: '0' + (i + 1), step: t.steps[i] }));\n    const projLinks = [\n      [\n        { label: t.repoLabel + ' ↗', url: 'https://github.com/ZenEngineeringLab/ZenAndVillage' },\n        { label: t.essay3Label + ' ↗', url: artUrls[2] },\n        { label: t.codeLabel + ' (v0.3.0) ↗', url: 'https://github.com/ZenEngineeringLab/ZenAndVillage/tree/v0.3.0' }\n      ],\n      [\n        { label: t.repoLabel + ' ↗', url: 'https://github.com/ZenEngineeringLab/ZenAndOps' },\n        { label: t.essay12aLabel + ' ↗', url: artUrls[0] },\n        { label: t.essay12bLabel + ' ↗', url: artUrls[1] },\n        { label: t.codeLabel + ' (1.8.1) ↗', url: 'https://github.com/ZenEngineeringLab/ZenAndOps/tree/1.8.1' }\n      ],\n      [\n        { label: t.repoLabel + ' ↗', url: 'https://github.com/heitorrapcinski/GovBR-Claude-Plugin' },\n        { label: t.essayLabel + ' ↗', url: artUrls[3] }\n      ]\n    ];\n    const projects = t.projects.map((p, i) => ({ ...p, links: projLinks[i] }));\n    const timeline = t.timeline.map(y => ({\n      ...y,\n      items: y.items.map(it => ({ ...it, fw: it.hl ? '600' : '400', color: it.hl ? 'var(--fg)' : 'var(--muted)' }))\n    }));\n    return {\n      t, articles, methods, projects, timeline,\n      isEn, isPt: !isEn,\n      enBg: isEn ? 'var(--accent)' : 'transparent',\n      enFg: isEn ? 'var(--bg)' : 'var(--muted)',\n      ptBg: !isEn ? 'var(--accent)' : 'transparent',\n      ptFg: !isEn ? 'var(--bg)' : 'var(--muted)',\n      setEn: () => this.setState({ lang: 'en' }),\n      setPt: () => this.setState({ lang: 'pt' }),\n      toggleTheme: () => this.setState(s => ({ dark: !s.dark }))\n    };\n  }\n}\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
